[env:pico]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino
board_build.core = earlephilhower
monitor_speed = 115200
build_src_filter = +<main.cpp> +<Encoder.cpp> +<PIDController.cpp> +<ServoInput.cpp>

[env:bringup]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino
board_build.core = earlephilhower
monitor_speed = 115200
build_src_filter = +<bringup.cpp> +<Encoder.cpp>
